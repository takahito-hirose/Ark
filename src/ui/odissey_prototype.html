<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK ODISSEY - The Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon-pink: #ff79c6;
            --neon-purple: #bd93f9;
            --bg-dark: #0d1117;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: var(--neon-pink);
        }

        /* 始動のハッチ演出 */
        #portal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #282a36 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #hatch {
            width: 280px;
            height: 280px;
            border: 12px solid #44475a;
            border-radius: 50%;
            background: #161b22;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(189, 147, 249, 0.4);
            position: relative;
            transition: transform 0.3s;
        }

        #hatch:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(255, 121, 198, 0.6);
        }

        #hatch::after {
            content: "IGNITE";
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 4px;
        }

        /* メインUIレイヤー */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            opacity: 0;
            transition: opacity 2s;
        }

        #sea-chart {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid var(--neon-purple);
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }

        #wheel-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            pointer-events: auto;
        }

        #ships-wheel {
            width: 160px;
            height: 160px;
            background: url('https://img.icons8.com/ios-filled/150/ff79c6/ship-wheel.png');
            background-size: contain;
        }

        .spinning {
            animation: spin 5s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .gauge-panel {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid var(--neon-purple);
            padding: 20px;
            min-width: 250px;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: #282a36;
            margin-top: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-fill {
            width: 42%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            transition: width 1s;
        }
    </style>
</head>

<body>

    <div id="portal-overlay" onclick="openHatch()">
        <div id="hatch"></div>
        <p style="margin-top: 40px; letter-spacing: 8px;">PROJECT ODISSEY</p>
        <p style="font-size: 0.7rem; opacity: 0.6;">AUTHENTICATION REQUIRED // CLICK TO DIVE</p>
    </div>

    <div id="ui-layer">
        <div id="sea-chart">
            <h2 style="margin: 10px 0;">THE SEA CHART</h2>
            <div id="mission-log" style="font-size: 0.9rem; color: #50fa7b;">航路計算完了。知性の海へ漕ぎ出します。</div>
        </div>

        <div class="gauge-panel">
            <div style="font-size: 0.8rem;">📍 VOYAGE PROGRESS: 42.0%</div>
            <div class="progress-track">
                <div id="progress-fill"></div>
            </div>
            <div style="margin-top: 10px; font-size: 0.7rem; color: var(--neon-purple);">SPIRIT (SYLPH) : STABLE</div>
        </div>

        <div id="wheel-container">
            <div id="ships-wheel" onclick="toggleThinking()"></div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, sea;
        function initODISSEY() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            const geometry = new THREE.PlaneGeometry(100, 100, 40, 40);
            const material = new THREE.MeshPhongMaterial({ color: 0x6272a4, wireframe: true, transparent: true, opacity: 0.3 });
            sea = new THREE.Mesh(geometry, material);
            sea.rotation.x = -Math.PI / 2;
            scene.add(sea);
            scene.add(new THREE.AmbientLight(0x44475a));
            const light = new THREE.PointLight(0xbd93f9, 2, 100); light.position.set(0, 10, 5); scene.add(light);
            camera.position.set(0, 4, 12); camera.lookAt(0, 2, 0);
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pos = sea.geometry.attributes.position.array;
            for (let i = 0; i < pos.length; i += 3) {
                pos[i + 2] = Math.sin(pos[i] * 0.3 + time) * 0.4 + Math.cos(pos[i + 1] * 0.3 + time) * 0.4;
            }
            sea.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        function openHatch() {
            const overlay = document.getElementById('portal-overlay');
            overlay.style.opacity = "0"; overlay.style.transform = "scale(1.5)";
            setTimeout(() => {
                overlay.style.display = 'none';
                const ui = document.getElementById('ui-layer'); ui.style.display = 'block';
                setTimeout(() => { ui.style.opacity = "1"; }, 100);
                initODISSEY();
            }, 1000);
        }
        function toggleThinking() { document.getElementById('ships-wheel').classList.toggle('spinning'); }
    </script>
</body>

</html>
