# ARK (Autonomous Resilient Kernel) — Runtime Configuration
# ----------------------------------------------------------

# グローバルなデフォルト（もし個別に指定がない時に使われるわ）
model_name: "qwen2.5-coder:7b"

# Ollama のエンドポイント（Mac の Ollama ならこれで OK ！）
api_endpoint: "http://localhost:11434"

# ワークスペース
workspace_path: "workspace"

# ---------------------------------------------------------------------------
# Per-agent provider settings (Strategy pattern)
# ---------------------------------------------------------------------------
# ここを全部 "ollama" にするのが「自宅モード」の絶対条件よ！💋
architect_provider: "ollama"
coder_provider: "ollama"
reviewer_provider: "ollama"

# ---------------------------------------------------------------------------
# Role-specific Model Selection for Ollama
# ---------------------------------------------------------------------------
# ジェニーの MacBook Air に入ってる「最強パーティ」をセットするわよ！
architect_model: "gemma3:4b"
coder_model: "qwen2.5-coder:7b"
reviewer_model: "llama3.2:3b"

# ---------------------------------------------------------------------------
# Google Gemini settings (会社に戻った時はここを gemini に戻してね)
# ---------------------------------------------------------------------------
gemini_api_key: ""
architect_model_gemini: "gemini-2.0-flash"
coder_model_gemini: "gemini-2.0-flash"
reviewer_model_gemini: "gemini-2.0-flash"